<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Team Amazonas</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #0b1a30; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 320px; 
            text-align: center; 
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d63031; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #b02a2a; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login de Acesso</h2>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="logar()">Entrar no Sistema</button>
</div>

<script>
    function logar() {
        const u = document.getElementById('usuario').value;
        const s = document.getElementById('senha').value;

        // Altere abaixo o usuário e senha desejados
        if(u === "admin" && s === "123") {
            window.location.href = "index.html"; // Redireciona para o seu arquivo
        } else {
            alert("Acesso Negado!");
        }
    }
</script>

</body>
</html>
