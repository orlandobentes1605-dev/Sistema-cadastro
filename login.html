<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Team Amazonas</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0b1a30; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d63031; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #b02a2a; }
        /* Estilo para o botão do GitHub */
        .btn-github { background: #24292e; }
        .btn-github:hover { background: #000; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login de Acesso</h2>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="logar()">Entrar no Sistema</button>
    
    <button id="btn-github" class="btn-github">Entrar com GitHub</button>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { 
        signInWithEmailAndPassword, 
        signInWithPopup, 
        GithubAuthProvider 
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const provider = new GithubAuthProvider();

    // Lógica original de email/senha
    window.logar = async function() {
        const email = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;
        try {
            await signInWithEmailAndPassword(auth, email, senha);
            window.location.href = "sistema.html"; 
        } catch (error) {
            alert("Acesso Negado: Verifique suas credenciais.");
        }
    }

    // Nova lógica do GitHub
    document.getElementById('btn-github').addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, provider);
            // Se logar com sucesso, redireciona
            window.location.href = "sistema.html";
        } catch (error) {
            console.error("Erro no login GitHub:", error.message);
            alert("Erro ao logar com GitHub: " + error.message);
        }
    });
</script>

</body>
</html>
