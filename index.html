<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Team Amazonas</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0b1a30; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-entrar { background: #27ae60; }
        .btn-cadastrar { background: #2980b9; }
        .btn-github { background: #24292e; }
    </style>
</head>
<body>

<h2>Acesso ao Sistema</h2>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="logar()">Entrar</button>
    <button onclick="cadastrar()">Criar Conta</button>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    window.logar = async () => {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        try {
            await signInWithEmailAndPassword(auth, email, senha);
            window.location.href = "sistema.html";
        } catch (e) { alert("Erro no login: " + e.message); }
    }

    window.cadastrar = async () => {
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, senha);
            await setDoc(doc(db, "usuarios", cred.user.uid), { nome: nome, nivel: "afiliado" });
            alert("Cadastro realizado!");
        } catch (e) { alert("Erro no cadastro: " + e.message); }
    }
</script>

</body>
</html>
