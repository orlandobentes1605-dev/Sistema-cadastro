<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Team Amazonas</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0b1a30; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-entrar { background: #27ae60; }
        .btn-cadastrar { background: #2980b9; }
        .btn-github { background: #24292e; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Acesso ao Sistema</h2>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    
    <button class="btn-entrar" onclick="logar()">Entrar no Sistema</button>
    <button class="btn-cadastrar" onclick="cadastrar()">Criar Conta</button>
    <button id="btn-github" class="btn-github">Entrar com GitHub</button>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword,
        signInWithPopup, 
        GithubAuthProvider 
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const provider = new GithubAuthProvider();

    // Lógica de Login
    window.logar = async function() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        try {
            await signInWithEmailAndPassword(auth, email, senha);
            window.location.href = "sistema.html";
        } catch (error) {
            alert("Erro no Login: " + error.message);
        }
    }

    // Lógica de Cadastro
    window.cadastrar = async function() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        try {
            await createUserWithEmailAndPassword(auth, email, senha);
            alert("Conta criada! Agora clique em 'Entrar' para acessar.");
        } catch (error) {
            alert("Erro no Cadastro: " + error.message);
        }
    }

    // Lógica GitHub
    document.getElementById('btn-github').addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, provider);
            window.location.href = "sistema.html";
        } catch (error) {
            alert("Erro no GitHub: " + error.message);
        }
    });
</script>

</body>
</html>
